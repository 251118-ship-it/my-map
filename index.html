<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kakao Traveler Map</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* 전체 레이아웃 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 사이드바 */
    .sidebar {
      width: 38%;
      min-width: 360px;
      background-color: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    /* 검색 영역 */
    .search-box {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .search-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .search-form {
      display: flex;
      gap: 10px;
    }

    .search-form input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    .search-form button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background-color: #FEE500;
      font-weight: bold;
      cursor: pointer;
    }

    .search-form button:hover {
      opacity: 0.9;
    }

    /* 검색 결과 */
    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .result-item {
      background-color: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .result-item:hover {
      background-color: #fafafa;
      transform: translateY(-2px);
    }

    .place-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #222;
    }

    .place-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .place-link {
      display: inline-block;
      margin-top: 8px;
      color: #0077ff;
      text-decoration: none;
      font-size: 14px;
    }

    /* 지도 영역 */
    .map-area {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* 인포윈도우 */
    .info-window {
      padding: 10px;
      min-width: 220px;
      font-size: 13px;
      line-height: 1.6;
    }

    .info-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .info-link {
      display: inline-block;
      margin-top: 8px;
      color: #0077ff;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 검색 영역 -->
    <div class="sidebar">

      <div class="search-box">

        <div class="search-title">
          🌍 Traveler Place Search
        </div>

        <div class="search-form">
          <input
            type="text"
            id="keyword"
            placeholder="한국어 / English 검색 가능"
          />

          <button id="searchButton">
            검색
          </button>
        </div>

      </div>

      <!-- 검색 결과 리스트 -->
      <div class="result-list" id="resultList"></div>

    </div>

    <!-- 지도 영역 -->
    <div class="map-area">
      <div id="map"></div>
    </div>

  </div>

  <!-- 카카오맵 SDK -->
  <script
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4f09686a3a6ea6e341dc32024547e295&libraries=services&autoload=false">
  </script>

  <script>

    // 지도 객체
    let map;

    // 장소 검색 객체
    let placesService;

    // 현재 위치 좌표
    let currentPosition;

    // 마커 배열
    let markers = [];

    // 인포윈도우 객체
    let infoWindow;

    // 지도 초기화 함수
    function initializeMap(latitude, longitude) {

      const mapContainer = document.getElementById("map");

      currentPosition = new kakao.maps.LatLng(latitude, longitude);

      const mapOption = {
        center: currentPosition,
        level: 5
      };

      // 지도 생성
      map = new kakao.maps.Map(mapContainer, mapOption);

      // 장소 검색 서비스 생성
      placesService = new kakao.maps.services.Places();

      // 현재 위치 마커 생성
      const currentMarker = new kakao.maps.Marker({
        position: currentPosition,
        map: map
      });

      // 현재 위치 인포윈도우
      infoWindow = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:8px; font-size:13px;">
            📍 현재 위치<br/>
            Current Location
          </div>
        `
      });

      infoWindow.open(map, currentMarker);
    }

    // 현재 위치 가져오기
    function getCurrentLocation() {

      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          // 위치 허용 성공
          function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            initializeMap(latitude, longitude);
          },

          // 위치 허용 실패
          function(error) {

            console.error(error);

            // 서울 시청 기본 위치
            initializeMap(37.5665, 126.9780);
          }

        );

      } else {

        initializeMap(37.5665, 126.9780);
      }
    }

    // 기존 마커 제거 함수
    function removeMarkers() {

      for (let i = 0; i < markers.length; i++) {
        markers[i].setMap(null);
      }

      markers = [];
    }

    // 검색 결과 초기화
    function clearResults() {

      removeMarkers();

      document.getElementById("resultList").innerHTML = "";
    }

    // 장소 검색 함수
    function searchPlaces() {

      const keyword = document
        .getElementById("keyword")
        .value
        .trim();

      if (!keyword) {
        alert("검색어를 입력해주세요.");
        return;
      }

      // 기존 검색 결과 제거
      clearResults();

      // 현재 지도 중심 기준 검색
      placesService.keywordSearch(
        keyword,
        placesSearchCallback,
        {
          location: map.getCenter(),
          radius: 20000
        }
      );
    }

    // 검색 결과 콜백
    function placesSearchCallback(data, status) {

      if (status !== kakao.maps.services.Status.OK) {

        alert("검색 결과가 없습니다.");
        return;
      }

      const resultList = document.getElementById("resultList");

      const bounds = new kakao.maps.LatLngBounds();

      // 검색 결과 반복
      data.forEach(function(place, index) {

        const position = new kakao.maps.LatLng(place.y, place.x);

        bounds.extend(position);

        // 이모지 마커 생성
        const marker = new kakao.maps.Marker({
          map: map,
          position: position,

          image: new kakao.maps.MarkerImage(
            "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png",
            new kakao.maps.Size(24, 35)
          )
        });

        markers.push(marker);

        // 영업시간 임시 표시
        const businessHours = "정보 없음 / No Information";

        // 결과 리스트 생성
        const item = document.createElement("div");

        item.className = "result-item";

        item.innerHTML = `
          <div class="place-name">
            ${index + 1}. ${place.place_name}
          </div>

          <div class="place-info">
            🇰🇷 주소: ${place.road_address_name || place.address_name}
          </div>

          <div class="place-info">
            🇺🇸 Address:
            ${place.road_address_name || place.address_name}
          </div>

          <div class="place-info">
            🕒 영업시간:
            ${businessHours}
          </div>

          <a
            class="place-link"
            href="${place.place_url}"
            target="_blank"
          >
            카카오맵 상세보기
          </a>
        `;

        // 팝업 내용
        const popupContent = `
          <div class="info-window">

            <div class="info-title">
              ${index + 1}. ${place.place_name}
            </div>

            <div>
              🇰🇷 주소<br/>
              ${place.road_address_name || place.address_name}
            </div>

            <br/>

            <div>
              🇺🇸 Address<br/>
              ${place.road_address_name || place.address_name}
            </div>

            <br/>

            <div>
              ☎️ ${place.phone || "번호 없음"}
            </div>

            <a
              class="info-link"
              href="${place.place_url}"
              target="_blank"
            >
              상세 링크 보기
            </a>

          </div>
        `;

        // 마커 클릭 이벤트
        kakao.maps.event.addListener(marker, "click", function() {

          infoWindow.close();

          infoWindow = new kakao.maps.InfoWindow({
            content: popupContent
          });

          infoWindow.open(map, marker);

          map.setCenter(position);
        });

        // 리스트 클릭 이벤트
        item.addEventListener("click", function() {

          map.setCenter(position);

          infoWindow.close();

          infoWindow = new kakao.maps.InfoWindow({
            content: popupContent
          });

          infoWindow.open(map, marker);
        });

        resultList.appendChild(item);

      });

      // 지도 범위 자동 조정
      map.setBounds(bounds);
    }

    // 카카오맵 로드 완료 후 실행
    kakao.maps.load(function() {

      // 현재 위치 가져오기
      getCurrentLocation();

      // 검색 버튼 클릭 이벤트
      document
        .getElementById("searchButton")
        .addEventListener("click", searchPlaces);

      // 엔터키 검색
      document
        .getElementById("keyword")
        .addEventListener("keydown", function(event) {

          if (event.key === "Enter") {
            searchPlaces();
          }
        });

    });

  </script>

</body>
</html>
