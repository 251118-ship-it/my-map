<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Explore Korea</title>

  <!-- 폰트 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      width: 100%;
      height: 100vh;

      overflow: hidden;

      font-family: 'Poppins', sans-serif;

      background:
        linear-gradient(
          135deg,
          #eefaf8,
          #f5f9ff
        );

      color: #1f2937;
    }

    .container {

      display: flex;

      width: 100%;
      height: 100vh;
    }

    /* ========================= */
    /* 왼쪽 패널 */
    /* ========================= */

    .sidebar {

      width: 430px;

      background:
        rgba(255,255,255,0.92);

      backdrop-filter: blur(12px);

      border-right:
        1px solid #e5e7eb;

      display: flex;

      flex-direction: column;

      overflow: hidden;
    }

    /* 헤더 */

    .hero-section {

      padding: 28px;

      background:
        linear-gradient(
          135deg,
          #dff7f2,
          #e8f4ff,
          #f7edff
        );
    }

    .main-title {

      font-size: 36px;

      font-weight: 700;

      letter-spacing: -1px;

      margin-bottom: 18px;
    }

    .hero-text {

      font-size: 14px;

      line-height: 1.9;

      color: #4b5563;

      margin-bottom: 22px;
    }

    /* 검색창 */

    .search-form {

      display: flex;

      gap: 10px;

      margin-bottom: 18px;
    }

    .search-form input {

      flex: 1;

      padding: 14px;

      border: none;

      border-radius: 18px;

      background: white;

      font-size: 14px;

      box-shadow:
        0 4px 16px rgba(0,0,0,0.06);
    }

    .search-form button {

      padding: 14px 18px;

      border: none;

      border-radius: 18px;

      background: #9be7d8;

      color: #134e4a;

      font-weight: 600;

      cursor: pointer;

      transition: 0.2s;
    }

    .search-form button:hover {

      background: #84dccb;

      transform: translateY(-2px);
    }

    /* 카테고리 */

    .category-section {

      display: flex;

      flex-wrap: wrap;

      gap: 10px;
    }

    .category-button {

      padding: 10px 14px;

      border: none;

      border-radius: 30px;

      font-size: 13px;

      font-weight: 500;

      cursor: pointer;

      transition: 0.2s;
    }

    .tour {
      background: #dff4ff;
    }

    .cafe {
      background: #ffe8ef;
    }

    .food {
      background: #fff4d9;
    }

    .hotel {
      background: #e8ffe7;
    }

    .store {
      background: #f2e8ff;
    }

    .category-button:hover {

      transform: translateY(-2px);
    }

    /* 결과 */

    .results-section {

      flex: 1;

      overflow-y: auto;

      padding: 22px;
    }

    .section-title {

      font-size: 18px;

      font-weight: 600;

      margin-bottom: 18px;
    }

    .result-card {

      background: white;

      border-radius: 24px;

      padding: 18px;

      margin-bottom: 16px;

      box-shadow:
        0 8px 24px rgba(0,0,0,0.05);

      transition: 0.2s;

      cursor: pointer;
    }

    .result-card:hover {

      transform: translateY(-3px);
    }

    .place-title {

      font-size: 18px;

      font-weight: 600;

      margin-bottom: 10px;
    }

    .english-name {

      font-size: 13px;

      color: #7c8aa0;

      margin-bottom: 12px;
    }

    .place-info {

      font-size: 14px;

      color: #4b5563;

      line-height: 1.8;

      margin-bottom: 7px;
    }

    .place-link {

      display: inline-block;

      margin-top: 12px;

      color: #2563eb;

      text-decoration: none;

      font-size: 14px;

      font-weight: 500;
    }

    /* 지도 */

    .map-area {

      flex: 1;

      position: relative;
    }

    #map {

      width: 100%;
      height: 100%;
    }

    /* 팝업 */

    .popup {

      padding: 12px;

      min-width: 250px;

      font-family: 'Poppins', sans-serif;

      line-height: 1.8;
    }

    .popup-title {

      font-size: 17px;

      font-weight: 600;

      margin-bottom: 10px;
    }

    .popup-sub {

      color: #6b7280;

      font-size: 13px;

      margin-bottom: 12px;
    }

    .popup-link {

      display: inline-block;

      margin-top: 10px;

      color: #2563eb;

      text-decoration: none;
    }

    /* 모바일 */

    @media screen and (max-width: 900px) {

      .container {

        flex-direction: column;
      }

      .sidebar {

        width: 100%;
        height: 50%;
      }

      .map-area {

        height: 50%;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- ========================= -->
    <!-- 왼쪽 -->
    <!-- ========================= -->

    <div class="sidebar">

      <div class="hero-section">

        <div class="main-title">
          Explore Korea.
        </div>

        <div class="hero-text">

          Discover, explore, feel.
          <br/>

          Travel smarter in Korea.
          <br/><br/>

          새로운 시선으로 한국을 발견하다.

        </div>

        <!-- 검색 -->

        <div class="search-form">

          <input
            type="text"
            id="keyword"
            placeholder="Search cafés, restaurants, attractions..."
          />

          <button id="searchButton">
            Search
          </button>

        </div>

        <!-- 카테고리 -->

        <div class="category-section">

          <button
            class="category-button tour"
            onclick="searchCategory('AT4')">

            🌏 관광지

          </button>

          <button
            class="category-button cafe"
            onclick="searchCategory('CE7')">

            ☕ 카페

          </button>

          <button
            class="category-button food"
            onclick="searchCategory('FD6')">

            🍜 맛집

          </button>

          <button
            class="category-button hotel"
            onclick="searchCategory('AD5')">

            🏨 숙소

          </button>

          <button
            class="category-button store"
            onclick="searchCategory('CS2')">

            🏪 편의점

          </button>

        </div>

      </div>

      <!-- 검색 결과 -->

      <div class="results-section">

        <div
          class="section-title"
          id="sectionTitle">

          🔥 Trending in Korea

        </div>

        <div id="resultList">

          <!-- 기본 추천 -->

          <div
            class="result-card"
            onclick="quickSearch('성수 카페')">

            <div class="place-title">
              ☕ Seongsu Cafés
            </div>

            <div class="english-name">
              Trending cafés in Seoul
            </div>

            <div class="place-info">
              서울에서 가장 인기 있는 감성 카페 거리
            </div>

          </div>

          <div
            class="result-card"
            onclick="quickSearch('한강공원')">

            <div class="place-title">
              🌃 Han River
            </div>

            <div class="english-name">
              Seoul Night View
            </div>

            <div class="place-info">
              서울 대표 야경 명소와 피크닉 장소
            </div>

          </div>

          <div
            class="result-card"
            onclick="quickSearch('북촌한옥마을')">

            <div class="place-title">
              🇰🇷 Bukchon Hanok Village
            </div>

            <div class="english-name">
              Traditional Korean Village
            </div>

            <div class="place-info">
              한국 전통 감성을 느낄 수 있는 관광지
            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- ========================= -->
    <!-- 지도 -->
    <!-- ========================= -->

    <div class="map-area">

      <div id="map"></div>

    </div>

  </div>

  <!-- 카카오맵 SDK -->

  <script
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4f09686a3a6ea6e341dc32024547e295&libraries=services&autoload=false">
  </script>

  <script>

    // 지도 객체
    let map;

    // 장소 검색 객체
    let placesService;

    // 마커 배열
    let markers = [];

    // 인포윈도우
    let infoWindow;

    // 지도 초기화

    function initializeMap(latitude, longitude) {

      const container =
        document.getElementById("map");

      const option = {

        center:
          new kakao.maps.LatLng(
            latitude,
            longitude
          ),

        level: 5
      };

      // 지도 생성
      map =
        new kakao.maps.Map(
          container,
          option
        );

      // 장소 검색 객체
      placesService =
        new kakao.maps.services.Places();

      // 현재 위치 마커
      const currentMarker =
        new kakao.maps.Marker({

          map: map,

          position:
            new kakao.maps.LatLng(
              latitude,
              longitude
            )
        });

      // 현재 위치 팝업
      infoWindow =
        new kakao.maps.InfoWindow({

          content:
            "<div style='padding:8px;'>📍 Current Location</div>"
        });

      infoWindow.open(
        map,
        currentMarker
      );
    }

    // 현재 위치

    function getCurrentLocation() {

      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          function(position) {

            initializeMap(
              position.coords.latitude,
              position.coords.longitude
            );

          },

          function(error) {

            console.error(error);

            initializeMap(
              37.5665,
              126.9780
            );
          }

        );

      } else {

        initializeMap(
          37.5665,
          126.9780
        );
      }
    }

    // 기존 마커 제거

    function removeMarkers() {

      for (let i = 0; i < markers.length; i++) {

        markers[i].setMap(null);
      }

      markers = [];
    }

    // 빠른 검색

    function quickSearch(keyword) {

      document
        .getElementById("keyword")
        .value = keyword;

      searchPlaces();
    }

    // 카테고리 검색

    function searchCategory(code) {

      const center =
        map.getCenter();

      placesService.categorySearch(

        code,

        placesSearchCallback,

        {
          x: center.getLng(),
          y: center.getLat(),
          radius: 12000
        }

      );
    }

    // 키워드 검색

    function searchPlaces() {

      const keyword =
        document
          .getElementById("keyword")
          .value
          .trim();

      if (!keyword) {

        alert("검색어를 입력해주세요.");
        return;
      }

      const center =
        map.getCenter();

      placesService.keywordSearch(

        keyword,

        placesSearchCallback,

        {
          x: center.getLng(),
          y: center.getLat(),
          radius: 15000
        }

      );
    }

    // 검색 결과 처리

    function placesSearchCallback(data, status) {

      console.log(data);

      if (
        status !==
        kakao.maps.services.Status.OK
      ) {

        alert("검색 결과가 없습니다.");
        return;
      }

      // 제목 변경

      document
        .getElementById("sectionTitle")
        .innerText =
          `🔎 Search Results (${data.length})`;

      const resultList =
        document.getElementById("resultList");

      resultList.innerHTML = "";

      // 기존 마커 제거
      removeMarkers();

      const bounds =
        new kakao.maps.LatLngBounds();

      // 검색 결과 반복

      data.forEach(function(place, index) {

        const position =
          new kakao.maps.LatLng(
            place.y,
            place.x
          );

        bounds.extend(position);

        // =========================
        // 노란색 별 마커
        // =========================

        const markerImage =
          new kakao.maps.MarkerImage(

            "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png",

            new kakao.maps.Size(24, 35)
          );

        const marker =
          new kakao.maps.Marker({

            map: map,

            position: position,

            image: markerImage
          });

        markers.push(marker);

        // 장소 정보

        const koreanName =
          place.place_name;

        const englishName =
          place.place_name;

        const roadAddress =
          place.road_address_name ||
          place.address_name;

        const englishAddress =
          place.address_name;

        const category =
          place.category_name ||
          "Place";

        const phone =
          place.phone ||
          "No Number";

        const openingHours =
          "No Information";

        // =========================
        // 카드 생성
        // =========================

        const card =
          document.createElement("div");

        card.className =
          "result-card";

        card.innerHTML = `

          <div class="place-title">

            ⭐ ${koreanName}

          </div>

          <div class="english-name">

            ${englishName}

          </div>

          <div class="place-info">

            📍 ${roadAddress}

          </div>

          <div class="place-info">

            🇺🇸 ${englishAddress}

          </div>

          <div class="place-info">

            🏷️ ${category}

          </div>

          <div class="place-info">

            ☎️ ${phone}

          </div>

          <div class="place-info">

            🕒 ${openingHours}

          </div>

          <a
            class="place-link"
            href="${place.place_url}"
            target="_blank">

            Open in Kakao Map

          </a>

        `;

        resultList.appendChild(card);

        // =========================
        // 팝업
        // =========================

        const popupContent = `

          <div class="popup">

            <div class="popup-title">

              ⭐ ${koreanName}

            </div>

            <div class="popup-sub">

              ${englishName}

            </div>

            <div>

              📍 ${roadAddress}

            </div>

            <br/>

            <div>

              🇺🇸 ${englishAddress}

            </div>

            <br/>

            <div>

              🏷️ ${category}

            </div>

            <br/>

            <div>

              ☎️ ${phone}

            </div>

            <br/>

            <div>

              🕒 ${openingHours}

            </div>

            <a
              class="popup-link"
              href="${place.place_url}"
              target="_blank">

              🔗 Open in Kakao Map

            </a>

          </div>

        `;

        // 마커 클릭

        kakao.maps.event.addListener(

          marker,

          "click",

          function() {

            infoWindow.close();

            infoWindow =
              new kakao.maps.InfoWindow({

                content: popupContent
              });

            infoWindow.open(
              map,
              marker
            );

            map.setCenter(position);

          }

        );

        // 카드 클릭

        card.addEventListener("click", function() {

          infoWindow.close();

          infoWindow =
            new kakao.maps.InfoWindow({

              content: popupContent
            });

          infoWindow.open(
            map,
            marker
          );

          map.setCenter(position);

        });

      });

      // 지도 범위 조정

      map.setBounds(bounds);
    }

    // 지도 로드 완료

    kakao.maps.load(function() {

      getCurrentLocation();

      // 검색 버튼

      document
        .getElementById("searchButton")
        .addEventListener("click", searchPlaces);

      // 엔터 검색

      document
        .getElementById("keyword")
        .addEventListener("keydown", function(event) {

          if (event.key === "Enter") {

            searchPlaces();
          }

        });

    });

  </script>

</body>
</html>
