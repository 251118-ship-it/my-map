<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오맵 현재 위치 검색</title>

  <style>
    /* 전체 기본 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* 화면 2분할 */
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    /* 왼쪽 검색 영역 */
    .sidebar {
      width: 35%;
      min-width: 320px;
      background-color: #f5f5f5;
      border-right: 1px solid #ddd;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    /* 검색창 */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    .search-box button {
      padding: 10px 15px;
      border: none;
      background-color: #ffcd00;
      cursor: pointer;
      font-weight: bold;
    }

    .search-box button:hover {
      background-color: #f0be00;
    }

    /* 검색 결과 */
    #placesList {
      list-style: none;
    }

    .place-item {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .place-item:hover {
      background-color: #fff8dc;
    }

    .place-item h3 {
      margin-bottom: 5px;
      font-size: 18px;
    }

    .place-item p {
      font-size: 14px;
      color: #555;
    }

    /* 오른쪽 지도 */
    #map {
      flex: 1;
      height: 100%;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 왼쪽 영역 -->
    <div class="sidebar">

      <h1>장소 검색</h1>

      <!-- 검색창 -->
      <div class="search-box">
        <input type="text" id="keyword" placeholder="장소를 입력하세요">
        <button onclick="searchPlaces()">검색</button>
      </div>

      <!-- 검색 결과 -->
      <ul id="placesList"></ul>

    </div>

    <!-- 지도 영역 -->
    <div id="map"></div>

  </div>

  <!-- 카카오맵 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4f09686a3a6ea6e341dc32024547e295&libraries=services"></script>

  <script>

    // 지도 객체 저장 변수
    let map;

    // 장소 검색 서비스 객체
    let placesService;

    // 마커 배열
    let markers = [];

    // 페이지 로드 완료 후 실행
    window.onload = function () {

      // 현재 위치 요청
      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(

          // 위치 허용 성공
          function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            // 지도 생성
            createMap(latitude, longitude);

          },

          // 위치 허용 실패
          function(error) {

            alert("위치 권한을 허용해주세요.");

            // 기본 위치로 지도 생성
            createMap(37.66, 126.83);

          }

        );

      } else {

        alert("현재 브라우저에서 위치 기능을 지원하지 않습니다.");

        // 기본 위치로 지도 생성
        createMap(37.66, 126.83);
      }
    };

    // 지도 생성 함수
    function createMap(latitude, longitude) {

      // 지도 영역 가져오기
      const mapContainer = document.getElementById("map");

      // 지도 옵션 설정
      const mapOption = {
        center: new kakao.maps.LatLng(latitude, longitude),
        level: 5
      };

      // 지도 생성
      map = new kakao.maps.Map(mapContainer, mapOption);

      // 현재 위치 마커 생성
      const currentMarker = new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(latitude, longitude)
      });

      // 현재 위치 인포윈도우
      const infoWindow = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:8px; font-size:14px;">
            현재 위치
          </div>
        `
      });

      infoWindow.open(map, currentMarker);

      // 장소 검색 서비스 생성
      placesService = new kakao.maps.services.Places();
    }

    // 장소 검색 함수
    function searchPlaces() {

      // 검색어 가져오기
      const keyword = document.getElementById("keyword").value;

      // 공백 검사
      if (!keyword.trim()) {

        alert("검색어를 입력해주세요.");
        return;
      }

      // 장소 검색 실행
      placesService.keywordSearch(keyword, placesSearchCallback);
    }

    // 검색 결과 콜백 함수
    function placesSearchCallback(data, status) {

      // 검색 성공 시
      if (status === kakao.maps.services.Status.OK) {

        // 기존 마커 제거
        removeMarkers();

        // 검색 결과 표시
        displayPlaces(data);

      } else {

        alert("검색 결과가 없습니다.");
      }
    }

    // 검색 결과 출력 함수
    function displayPlaces(places) {

      // 리스트 영역 가져오기
      const listElement = document.getElementById("placesList");

      // 기존 리스트 제거
      listElement.innerHTML = "";

      // 지도 범위 객체
      const bounds = new kakao.maps.LatLngBounds();

      // 장소 반복
      places.forEach((place) => {

        // 좌표 생성
        const position = new kakao.maps.LatLng(place.y, place.x);

        // 마커 생성
        const marker = new kakao.maps.Marker({
          map: map,
          position: position
        });

        // 마커 저장
        markers.push(marker);

        // 지도 범위 추가
        bounds.extend(position);

        // 리스트 아이템 생성
        const item = document.createElement("li");

        item.className = "place-item";

        item.innerHTML = `
          <h3>${place.place_name}</h3>
          <p>${place.address_name}</p>
          <p>${place.phone || "전화번호 없음"}</p>
        `;

        // 리스트 클릭 시 지도 이동
        item.addEventListener("click", () => {

          map.setCenter(position);
          map.setLevel(3);

        });

        // 인포윈도우 생성
        const infoWindow = new kakao.maps.InfoWindow({
          content: `
            <div style="padding:8px; font-size:14px;">
              ${place.place_name}
            </div>
          `
        });

        // 마커 클릭 이벤트
        kakao.maps.event.addListener(marker, "click", () => {

          infoWindow.open(map, marker);

        });

        // 리스트 추가
        listElement.appendChild(item);

      });

      // 검색 결과 범위로 지도 이동
      map.setBounds(bounds);
    }

    // 기존 마커 제거 함수
    function removeMarkers() {

      for (let i = 0; i < markers.length; i++) {

        markers[i].setMap(null);

      }

      markers = [];
    }

  </script>

</body>
</html>
