<!-- ========================= -->
<!-- 검색 결과 표시 부분 -->
<!-- 기존 placesSearchCallback 함수 전체 교체 -->
<!-- ========================= -->

<script>

  // 현재 마커 타입 저장
  let currentCategory = "default";

  // 카테고리 검색
  function searchCategory(code, categoryType) {

    clearResults();

    currentCategory = categoryType;

    const center = map.getCenter();

    placesService.categorySearch(

      code,

      placesSearchCallback,

      {
        x: center.getLng(),
        y: center.getLat(),
        radius: 12000
      }

    );
  }

  // 키워드 검색
  function searchPlaces() {

    const keyword =
      document
        .getElementById("keyword")
        .value
        .trim();

    if (!keyword) {

      alert("검색어를 입력해주세요.");
      return;
    }

    clearResults();

    currentCategory = "default";

    const center = map.getCenter();

    placesService.keywordSearch(

      keyword,

      placesSearchCallback,

      {
        x: center.getLng(),
        y: center.getLat(),
        radius: 15000
      }

    );
  }

  // 검색 결과 콜백
  function placesSearchCallback(data, status) {

    console.log(data);

    if (
      status !==
      kakao.maps.services.Status.OK
    ) {

      alert("검색 결과가 없습니다.");
      return;
    }

    const resultList =
      document.getElementById("resultList");

    resultList.innerHTML = "";

    const bounds =
      new kakao.maps.LatLngBounds();

    // 검색 결과 반복
    data.forEach(function(place, index) {

      const position =
        new kakao.maps.LatLng(
          place.y,
          place.x
        );

      bounds.extend(position);

      // =========================
      // 마커 설정
      // =========================

      let marker;

      // 관광지는 노란색 기본 포인터
      if (currentCategory === "tour") {

        marker =
          new kakao.maps.Marker({

            map: map,

            position: position
          });

      }

      // 카페
      else if (currentCategory === "cafe") {

        marker =
          createEmojiMarker(
            position,
            "☕"
          );
      }

      // 맛집
      else if (currentCategory === "food") {

        marker =
          createEmojiMarker(
            position,
            "🍜"
          );
      }

      // 숙소
      else if (currentCategory === "hotel") {

        marker =
          createEmojiMarker(
            position,
            "🏨"
          );
      }

      // 편의점
      else if (currentCategory === "store") {

        marker =
          createEmojiMarker(
            position,
            "🏪"
          );
      }

      // 일반 검색
      else {

        marker =
          new kakao.maps.Marker({

            map: map,

            position: position
          });
      }

      markers.push(marker);

      // =========================
      // 장소 정보
      // =========================

      const koreanName =
        place.place_name;

      // 영어 이름 임시 처리
      const englishName =
        place.place_name;

      const roadAddress =
        place.road_address_name ||
        place.address_name;

      const englishAddress =
        place.address_name;

      const phone =
        place.phone ||
        "No Number";

      // 카테고리 설명
      const category =
        place.category_name ||
        "Place";

      // 영업시간
      const openingHours =
        "No Information";

      // =========================
      // 결과 카드 생성
      // =========================

      const card =
        document.createElement("div");

      card.className =
        "result-card";

      card.innerHTML = `

        <div class="place-title">

          ${index + 1}.
          ${koreanName}

        </div>

        <div class="english-name">

          ${englishName}

        </div>

        <div class="place-info">

          📍 ${roadAddress}

        </div>

        <div class="place-info">

          🇺🇸 ${englishAddress}

        </div>

        <div class="place-info">

          🏷️ ${category}

        </div>

        <div class="place-info">

          ☎️ ${phone}

        </div>

        <div class="place-info">

          🕒 ${openingHours}

        </div>

        <a
          class="place-link"
          href="${place.place_url}"
          target="_blank">

          Open in Kakao Map

        </a>

      `;

      resultList.appendChild(card);

      // =========================
      // 팝업 내용
      // =========================

      const popupContent = `

        <div class="popup">

          <div class="popup-title">

            ${koreanName}

          </div>

          <div style="
            color:#6b7280;
            margin-bottom:10px;
          ">

            ${englishName}

          </div>

          <div style="margin-bottom:8px;">

            📍
            ${roadAddress}

          </div>

          <div style="margin-bottom:8px;">

            🇺🇸
            ${englishAddress}

          </div>

          <div style="margin-bottom:8px;">

            🏷️
            ${category}

          </div>

          <div style="margin-bottom:8px;">

            ☎️
            ${phone}

          </div>

          <div style="margin-bottom:8px;">

            🕒
            ${openingHours}

          </div>

          <a
            class="popup-link"
            href="${place.place_url}"
            target="_blank">

            🔗 Open in Kakao Map

          </a>

        </div>

      `;

      // =========================
      // 마커 클릭 이벤트
      // =========================

      if (currentCategory === "tour") {

        kakao.maps.event.addListener(

          marker,

          "click",

          function() {

            infoWindow.close();

            infoWindow =
              new kakao.maps.InfoWindow({

                content: popupContent
              });

            infoWindow.open(
              map,
              marker
            );

            map.setCenter(position);

          }

        );

      }

      // 카드 클릭 이벤트
      card.addEventListener("click", function() {

        infoWindow.close();

        infoWindow =
          new kakao.maps.InfoWindow({

            content: popupContent
          });

        infoWindow.open(
          map,
          marker
        );

        map.setCenter(position);

      });

    });

    // 지도 범위 자동 조정
    map.setBounds(bounds);
  }

  // =========================
  // 이모지 마커 생성 함수
  // =========================

  function createEmojiMarker(position, emoji) {

    const overlay =
      new kakao.maps.CustomOverlay({

        position: position,

        content: `

          <div style="
            font-size:30px;
            transform:translateY(-10px);
          ">
            ${emoji}
          </div>

        `
      });

    overlay.setMap(map);

    return overlay;
  }

</script>
